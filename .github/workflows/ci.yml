name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    needs: backend

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Run deterministic benchmark smoke
        run: |
          CHIRON_LLM_MODE=heuristic \
          CHIRON_LITERATURE_CONNECTOR_MODE=mock \
          CHIRON_TRIALS_CONNECTOR_MODE=mock \
          CHIRON_DRUG_SAFETY_CONNECTOR_MODE=mock \
          CHIRON_GUIDELINE_CONNECTOR_MODE=mock \
          uv run python -m app.evaluation.runner \
            --benchmark ../eval/benchmark.json \
            --output ../eval/reports/ci-smoke.json \
            --label ci-smoke
