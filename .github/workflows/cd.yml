name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    name: Build Deploy Artifacts
    runs-on: ubuntu-latest

    outputs:
      frontend-archive: frontend-dist.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Backend tests
        working-directory: backend
        run: |
          uv sync --all-groups
          uv run pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend for production
        working-directory: frontend
        run: |
          VITE_API_BASE_URL=/api npm run build
          tar -C dist -czf ../frontend-dist.tar.gz .

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          if-no-files-found: error

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy frontend artifact to server
        run: |
          scp frontend-dist.tar.gz \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/frontend-dist.tar.gz"

      - name: Deploy backend and frontend
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" <<'EOF'
          set -euo pipefail

          APP_ROOT="/home/${USER}/Chiron"
          BACKEND_DIR="$APP_ROOT/backend"
          FRONTEND_DIR="$APP_ROOT/frontend-dist"
          FRONTEND_ARCHIVE="/home/${USER}/frontend-dist.tar.gz"

          if [ ! -d "$APP_ROOT/.git" ]; then
            git clone https://github.com/VectorSigmaOmega/Chiron.git "$APP_ROOT"
          fi

          git -C "$APP_ROOT" fetch origin main
          git -C "$APP_ROOT" checkout main
          git -C "$APP_ROOT" pull --ff-only origin main

          python3 -m venv "$BACKEND_DIR/.venv"
          "$BACKEND_DIR/.venv/bin/pip" install --upgrade pip
          "$BACKEND_DIR/.venv/bin/pip" install -e "$BACKEND_DIR"

          mkdir -p "$FRONTEND_DIR"
          find "$FRONTEND_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$FRONTEND_ARCHIVE" -C "$FRONTEND_DIR"
          rm -f "$FRONTEND_ARCHIVE"

          sudo systemctl restart chiron-backend
          sudo systemctl reload nginx

          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          sudo systemctl status --no-pager chiron-backend || true
          exit 1
          EOF
